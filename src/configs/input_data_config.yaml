labels:
  title_label: "Schooltuinen Amsterdam Roosterplanner"
  # subheader_label: "*** Uitleg voor gebruik ***"
  subheader_label: |
      Amsterdamse Schooltuinen X ADC - Collective Week 2025
      **Gebruiksaanwijzing programma:** 

      **Stap 1.** Upload drie bestanden:  
        - **A. Beschikbaarheid medewerkers:** De beschikbaarheid van alle medewerkers op alle mogelijke uren voor specifieke tuinen. Een 'N' betekent dat de leraar niet beschikbaar is, een 'B' betekent dat de leraar beschikbaar is.  
        - **B. Beschikbaarheid groepen:** De beschikbaarheid van alle groepen voor specifieke tuinen. De data komt uit de ingevulde forms met daarin de voorkeuren voor tijden en dagen.
        - **C. Schooltuinen informatie:** In dit bestand is alle informatie over de beschikbare tuinen te vinden. Bijvoorbeeld het maximale aantal groepen, bussen en reservetuintjes. 

      **Stap 2.** Klik op '_Draai Programma_' en wacht tot de '_Klaar met optimalisatie_' tekst en de resultaten verschijnen. De resultaten laten informatie over de optimilisatie zien, zoals bijvoorbeeld hoeveel groepen niet zijn ingedeeld per tuin.

      **Stap 3.** Download geoptimaliseerd rooster door op '_Download Resultaten_' te klikken.
  educators_label: "Beschikbaarheid medewerkers"
  school_label: "Beschikbaarheid groepen"
  garden_label: "Schooltuinen informatie"
  run_label: "Draai programma"
  finished_run_label: "Klaar met optimalisatie!"
test:
  test_sub: 1
  test_sub_2: hello
etl:
  school:
    primary_keys: 
      - "period_id"
      - "school_id"
      - "garden_name"
    col_mapping:
      - "code": code
      - "periodeid": period_id
      - "schoolcode": school_id
      - "naam": name
      - "lopenofbus": transport_type
      - "telefoon": phone
      - "tuinlocatie": garden_name
      - "groepniveauvan": group_level
      - "groep": group
      - "leerlingen": students
      - "voorkeursperiode": preferred_period
      - "opmerkingen": comments
      - "SO boeken / Engels": special_education_books
      - "vrijveld1": num_groups_from_school
      - "vrijveld2": preference_1
      - "vrijveld3": preference_2
      - "vrijveld4": preference_3
      - "vrijveld5": preference_4
      - "vrijveld6": preference_5
      - "locatie": location
    col_names_to_check_duplicates:
      - schoolcode
      - naam
      - groep
    col_names_timeslots:
      - preference_1
      - preference_2
      - preference_3
      - preference_4
      - preference_5
  educator:
    primary_keys: 
      - "garden_name"
      - "educator"
    col_mapping:
      - "Tuinlocatie": "garden_name"
      - "Medewerker": "educator"
  garden:
    primary_keys: 
      - "garden_name"
    col_mapping:
      - "Tuinlocatie": "garden_name"
      - "Aantal beschikbare tuintjes": "available_plots"
      - "Maximaal aantal groepen per tijdslot": "max_groups_per_timeslot"
      - "Maximaal aantal bussen per tijdslot": "max_buses_per_timeslot"
      - "Aantal reserve tuintjes": "reserved_plots"
